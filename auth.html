<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Daily Protocol — Auth</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 60px auto; padding: 20px; text-align: center; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background: #fff; }
    button:hover { background: #f4f4f4; }
    #status { margin-top: 20px; font-size: 14px; color: #555; }
    .ok { color: #2a7a2a; }
    .err { color: #b00; }
  </style>
</head>
<body>
  <h1>Daily Protocol — Auth</h1>
  <p>Connect your Google Calendar. You only need to do this <strong>once</strong>.</p>
  <button id="connect">Connect Google Calendar</button>
  <div id="status"></div>

  <script>
    // ── CONFIG ────────────────────────────────────────────────────────────
    const CLIENT_ID    = '788943371871-n713sgr9t3oifkev2abln7615eulgbv4.apps.googleusercontent.com';
    const REDIRECT_URI = 'https://jianglx254.github.io/daily-protocol/auth.html';
    const WORKER_URL   = 'https://daily-protocol.lunxjiang.workers.dev';
    const SCOPE        = 'https://www.googleapis.com/auth/calendar.readonly';

    const statusEl = document.getElementById('status');
    const btn = document.getElementById('connect');

    // ── Step 1: button kicks off OAuth ────────────────────────────────────
    btn.addEventListener('click', () => {
      const authUrl = new URL('https://accounts.google.com/o/oauth2/v2/auth');
      authUrl.searchParams.set('client_id', CLIENT_ID);
      authUrl.searchParams.set('redirect_uri', REDIRECT_URI);
      authUrl.searchParams.set('response_type', 'code');
      authUrl.searchParams.set('scope', SCOPE);
      authUrl.searchParams.set('access_type', 'offline');  // needed for refresh token
      authUrl.searchParams.set('prompt', 'consent');       // forces refresh token re-issue
      window.location.href = authUrl.toString();
    });

    // ── Step 2: when Google redirects back with ?code=..., send to Worker ─
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) {
        statusEl.textContent = 'Auth error: ' + error;
        statusEl.className = 'err';
        return;
      }
      if (!code) return;

      statusEl.textContent = 'Exchanging code with Worker...';
      try {
        const resp = await fetch(WORKER_URL + '/exchange', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await resp.json();
        if (data.ok) {
          statusEl.innerHTML = '✅ Connected! You can close this tab.<br>' +
            (data.hasRefresh ? 'Refresh token saved — no need to re-auth.' : '⚠️ No refresh token received.');
          statusEl.className = 'ok';
          // Clean the URL
          window.history.replaceState({}, '', REDIRECT_URI);
        } else {
          statusEl.textContent = 'Exchange failed: ' + JSON.stringify(data);
          statusEl.className = 'err';
        }
      } catch (e) {
        statusEl.textContent = 'Network error: ' + e.message;
        statusEl.className = 'err';
      }
    })();
  </script>
</body>
</html>
