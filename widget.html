<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Protocol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Roboto Mono', 'Menlo', monospace;
      --gray: #bdbdbd;
      --dgray: #757575;
      --light: #eeeeee;
      --primary: #2bbbad;
      --error: #ef3744;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: transparent;
      font-family: var(--font);
      width: 100%;
      height: 100%;
      color: #444;
      overflow: hidden;
    }
    #container {
      width: 100%;
      height: 100vh;
      max-width: 520px;
      padding: 16px 14px 12px 14px;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .title {
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.85rem;
      color: var(--dgray);
    }
    .clock {
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      color: #222;
      white-space: nowrap;
    }
    .next-up {
      font-size: 0.78rem;
      color: var(--dgray);
      margin-bottom: 10px;
      letter-spacing: 0.02em;
      flex-shrink: 0;
      min-height: 1em;
    }
    .next-up b { color: var(--primary); font-weight: 500; }
    .message {
      font-size: 0.88rem;
      color: var(--gray);
      margin: 8px 0 16px 0;
      line-height: 1.5;
    }
    .message.error { color: var(--error); }

    /* ── Timeline (squished gaps, proportional events) ────────────── */
    .timeline {
      position: relative;
      flex: 1;
      margin-left: 12px;
      border-left: 2px solid var(--light);
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .event {
      position: relative;
      padding: 4px 0 4px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex-shrink: 0;
      z-index: 2;
    }
    .event::before {
      content: '';
      position: absolute;
      left: -7px;
      top: 8px;
      width: 10px;
      height: 10px;
      background: #fff;
      border: 2px solid var(--gray);
      border-radius: 50%;
      z-index: 3;
    }
    .event.is-now::before  { background: var(--primary); border-color: var(--primary); }
    .event.is-past::before { border-color: var(--light); }
    .event-time {
      font-size: 0.72rem;
      color: var(--gray);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }
    .event.is-now .event-time  { color: var(--primary); }
    .event.is-past .event-time { color: var(--gray); }
    .event-title {
      font-size: 0.92rem;
      color: #444;
      font-weight: 400;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event.is-now .event-title  { color: var(--primary); font-weight: 500; }
    .event.is-past .event-title { color: var(--gray); text-decoration: line-through; text-decoration-color: var(--light); }

    /* Gap spacer between events */
    .gap {
      flex-shrink: 0;
      height: 14px;
      position: relative;
    }

    /* SLEEP end-of-day marker */
    .sleep-marker {
      position: relative;
      padding: 6px 0 4px 22px;
      flex-shrink: 0;
      margin-top: 4px;
      z-index: 2;
    }
    .sleep-marker::before {
      content: '';
      position: absolute;
      left: -7px;
      top: 10px;
      width: 10px;
      height: 10px;
      background: #444;
      border: 2px solid #444;
      border-radius: 50%;
      z-index: 3;
    }
    .sleep-marker .event-time { font-size: 0.72rem; color: var(--gray); }
    .sleep-marker .event-title {
      font-size: 0.92rem;
      color: #444;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* "You are here" line */
    .now-line {
      position: absolute;
      left: -2px;
      right: 0;
      height: 2px;
      background: var(--primary);
      z-index: 1;
      pointer-events: none;
    }
    .now-line::before {
      content: '';
      position: absolute;
      left: -5px;
      top: -3px;
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      z-index: 4;
    }
    .now-line::after {
      content: 'now';
      position: absolute;
      right: 4px;
      top: -8px;
      font-size: 0.65rem;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 4px;
      z-index: 4;
    }

    .no-events {
      color: var(--gray);
      font-size: 0.9rem;
      padding: 4px 0 0 22px;
    }
    .refresh-note {
      margin-top: 8px;
      font-size: 0.7rem;
      color: #ddd;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="container">
    <div class="header">
      <div class="title">Daily Protocol</div>
      <div class="clock" id="clock"></div>
    </div>
    <div class="next-up" id="next-up"></div>
    <div class="message" id="message">loading...</div>
    <div class="timeline" id="timeline" style="display:none;"></div>
    <div class="refresh-note" id="refresh-note"></div>
  </div>
  <script>
    const WORKER_URL = 'https://daily-protocol.lunxjiang.workers.dev';
    const SLEEP_MARKER = '— SLEEP —';

    let cachedEvents = [];

    // ── Clock ────────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const h = now.getHours();
      document.getElementById('clock').textContent =
        `${h % 12 || 12}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${h < 12 ? 'am' : 'pm'}`;
    }
    setInterval(updateClock, 500);
    updateClock();

    // ── Helpers ──────────────────────────────────────────────────────
    function formatTime(date) {
      const h = date.getHours();
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${h % 12 || 12}:${m}${h < 12 ? 'am' : 'pm'}`;
    }
    function setMessage(msg, isError = false) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = 'message' + (isError ? ' error' : '');
      el.style.display = msg ? 'block' : 'none';
    }
    function eventStart(ev) { return ev.start.dateTime ? new Date(ev.start.dateTime) : new Date(ev.start.date); }
    function eventEnd(ev)   { return ev.end.dateTime   ? new Date(ev.end.dateTime)   : new Date(ev.end.date); }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    // ── Fetch ────────────────────────────────────────────────────────
    async function loadEvents() {
      try {
        const resp = await fetch(WORKER_URL + '/events');
        const data = await resp.json();
        if (!resp.ok) {
          if (resp.status === 401) setMessage('Not connected. Please open auth.html to sign in.', true);
          else setMessage('Error loading events: ' + (data.error || resp.status), true);
          document.getElementById('timeline').style.display = 'none';
          return;
        }
        setMessage('');

        const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
        const todayEnd   = new Date(todayStart.getTime() + 36 * 3600 * 1000);

        const all = (data.events || []).filter(ev => ev.start.dateTime);
        all.sort((a, b) => eventStart(a) - eventStart(b));

        const todays = [];
        for (const ev of all) {
          const s = eventStart(ev);
          if (s < todayStart || s > todayEnd) continue;
          todays.push(ev);
          if ((ev.summary || '').trim() === SLEEP_MARKER) break;
        }
        cachedEvents = todays;
        renderTimeline();

        document.getElementById('refresh-note').textContent = `updated ${formatTime(new Date())}`;
      } catch (e) {
        setMessage('Cannot reach worker. Check WORKER_URL.', true);
        document.getElementById('timeline').style.display = 'none';
      }
    }

    // ── Render: events flex-sized by duration, gaps fixed-size ───────
    function renderTimeline() {
      const timeline = document.getElementById('timeline');
      const nextUp = document.getElementById('next-up');
      timeline.innerHTML = '';
      timeline.style.display = 'flex';

      if (!cachedEvents.length) {
        timeline.innerHTML = '<div class="no-events">no events today.</div>';
        nextUp.textContent = '';
        return;
      }

      const now = new Date();
      const sleepEv = cachedEvents.find(ev => (ev.summary || '').trim() === SLEEP_MARKER);
      const realEvents = cachedEvents.filter(ev => (ev.summary || '').trim() !== SLEEP_MARKER);

      if (!realEvents.length) {
        timeline.innerHTML = '<div class="no-events">no events today.</div>';
        nextUp.textContent = '';
        return;
      }

      const upcoming = realEvents.find(ev => eventStart(ev) > now);
      const current = realEvents.find(ev => eventStart(ev) <= now && eventEnd(ev) > now);
      if (current) {
        nextUp.innerHTML = `now: <b>${escapeHtml(current.summary || '(untitled)')}</b>`;
      } else if (upcoming) {
        const mins = Math.round((eventStart(upcoming) - now) / 60000);
        const label = mins < 1 ? 'starting now'
                    : mins < 60 ? `in ${mins} min`
                    : `in ${Math.floor(mins/60)}h ${mins%60}m`;
        nextUp.innerHTML = `next: <b>${escapeHtml(upcoming.summary || '(untitled)')}</b> · ${label}`;
      } else {
        nextUp.textContent = 'day complete.';
      }

      const MIN_FLEX = 8;

      realEvents.forEach((ev, idx) => {
        const s = eventStart(ev);
        const e = eventEnd(ev);
        const durMin = Math.max(1, (e - s) / 60000);
        const isPast = e < now;
        const isNow = s <= now && e > now;

        const div = document.createElement('div');
        div.className = ['event', isPast ? 'is-past' : '', isNow ? 'is-now' : ''].filter(Boolean).join(' ');
        div.style.flex = `${Math.max(MIN_FLEX, durMin)} 1 0`;
        div.dataset.start = s.getTime();
        div.dataset.end = e.getTime();
        div.innerHTML = `
          <div class="event-time">${formatTime(s)} — ${formatTime(e)}</div>
          <div class="event-title">${escapeHtml(ev.summary || '(no title)')}</div>
        `;
        timeline.appendChild(div);

        if (idx < realEvents.length - 1) {
          const nextStart = eventStart(realEvents[idx + 1]);
          const gapMin = (nextStart - e) / 60000;
          if (gapMin > 0.5) {
            const gap = document.createElement('div');
            gap.className = 'gap';
            gap.dataset.gapStart = e.getTime();
            gap.dataset.gapEnd = nextStart.getTime();
            timeline.appendChild(gap);
          }
        }
      });

      // SLEEP end marker (compact, not proportional)
      if (sleepEv) {
        const lastEnd = eventEnd(realEvents[realEvents.length - 1]);
        const sleepStart = eventStart(sleepEv);
        const gapMin = (sleepStart - lastEnd) / 60000;
        if (gapMin > 0.5) {
          const gap = document.createElement('div');
          gap.className = 'gap';
          gap.dataset.gapStart = lastEnd.getTime();
          gap.dataset.gapEnd = sleepStart.getTime();
          timeline.appendChild(gap);
        }
        const marker = document.createElement('div');
        marker.className = 'sleep-marker';
        marker.innerHTML = `
          <div class="event-time">${formatTime(sleepStart)}</div>
          <div class="event-title">— SLEEP —</div>
        `;
        timeline.appendChild(marker);
      }

      // ── "Now" line ─────────────────────────────────────────────────
      requestAnimationFrame(() => {
        timeline.querySelectorAll('.now-line').forEach(n => n.remove());
        const tlRect = timeline.getBoundingClientRect();
        const nowMs = now.getTime();
        const allRows = Array.from(timeline.children).filter(c =>
          c.classList.contains('event') || c.classList.contains('gap')
        );
        let targetTopPx = null;
        for (const row of allRows) {
          const rs = Number(row.dataset.start || row.dataset.gapStart);
          const re = Number(row.dataset.end   || row.dataset.gapEnd);
          if (!rs || !re) continue;
          if (nowMs >= rs && nowMs <= re) {
            const rect = row.getBoundingClientRect();
            const frac = (nowMs - rs) / (re - rs);
            targetTopPx = (rect.top - tlRect.top) + rect.height * frac;
            break;
          }
        }
        if (targetTopPx === null) {
          const firstStart = eventStart(realEvents[0]).getTime();
          const lastEnd = eventEnd(realEvents[realEvents.length - 1]).getTime();
          if (nowMs < firstStart) targetTopPx = 0;
          else if (nowMs > lastEnd) targetTopPx = tlRect.height - 2;
          else return;
        }
        const line = document.createElement('div');
        line.className = 'now-line';
        line.style.top = targetTopPx + 'px';
        timeline.appendChild(line);
      });
    }

    // ── Refresh cadences ─────────────────────────────────────────────
    loadEvents();
    setInterval(loadEvents, 5 * 60 * 1000);
    setInterval(renderTimeline, 30 * 1000);
    window.addEventListener('resize', () => requestAnimationFrame(renderTimeline));
  </script>
</body>
</html>
