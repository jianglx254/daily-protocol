<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tasks</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg: #ffffff;
    --bg-hover: #f7f7f5;
    --bg-subtle: #f1f1ef;
    --border: #e9e9e7;
    --border-strong: #d3d3d1;
    --text: #37352f;
    --text-soft: #787774;
    --text-faint: #9b9a97;
    --accent: #2383e2;
    --red: #e03e3e;
    --orange: #d9730d;
    --yellow: #cb912f;
    --green: #0f7b3f;
    --shadow: 0 4px 12px rgba(15, 15, 15, 0.1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919;
      --bg-hover: #252525;
      --bg-subtle: #2f2f2f;
      --border: #2f2f2f;
      --border-strong: #3f3f3f;
      --text: #e6e6e4;
      --text-soft: #9b9a97;
      --text-faint: #6f6e69;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .header {
    display: flex; align-items: center;
    padding: 10px 14px; gap: 4px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .view-tabs { display: flex; gap: 2px; flex: 1; }
  .view-tab {
    background: none; border: none;
    padding: 5px 10px; border-radius: 4px;
    color: var(--text-soft); cursor: pointer;
    font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .view-tab:hover { background: var(--bg-hover); color: var(--text); }
  .view-tab.active { background: var(--bg-subtle); color: var(--text); }
  .view-tab .count {
    background: var(--border); color: var(--text-soft);
    font-size: 11px; padding: 0 5px;
    border-radius: 8px; min-width: 16px; text-align: center;
  }
  .view-tab.active .count { background: var(--border-strong); }
  .filter-btn {
    background: none; border: none;
    padding: 5px 10px; border-radius: 4px;
    color: var(--text-soft); cursor: pointer;
    font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .filter-btn:hover { background: var(--bg-hover); color: var(--text); }
  .filter-btn.has-filters { color: var(--accent); }
  .filter-btn .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }
  .icon-btn {
    background: none; border: none;
    width: 28px; height: 28px;
    border-radius: 4px; cursor: pointer;
    color: var(--text-soft);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .icon-btn:hover { background: var(--bg-hover); color: var(--text); }

  .preset-bar {
    display: flex; gap: 4px; padding: 6px 14px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .preset-bar::-webkit-scrollbar { display: none; }
  .preset-bar:empty { display: none; }
  .preset {
    background: var(--bg); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 12px;
    cursor: pointer; font-size: 12px;
    color: var(--text-soft); white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .preset:hover { border-color: var(--border-strong); color: var(--text); }
  .preset.active {
    background: var(--bg-subtle); color: var(--text);
    border-color: var(--border-strong); font-weight: 500;
  }
  .preset.smart { border-style: dashed; }
  .preset-count {
    background: var(--border); color: var(--text-soft);
    font-size: 10px; padding: 0 5px;
    border-radius: 7px; margin-left: 4px;
  }
  .preset.active .preset-count {
    background: rgba(35, 131, 226, 0.2); color: var(--accent);
  }
  .preset-menu {
    opacity: 0; cursor: pointer;
    color: var(--text-faint); padding: 0 4px;
    font-size: 13px; line-height: 1;
  }
  .preset:hover .preset-menu { opacity: 1; }
  .preset-menu:hover { color: var(--text); }
  .preset-add {
    background: none; border: 1px dashed var(--border);
    padding: 3px 10px; border-radius: 12px;
    cursor: pointer; font-size: 12px;
    color: var(--text-faint); flex-shrink: 0;
  }
  .preset-add:hover { color: var(--accent); border-color: var(--accent); }
  .default-marker { color: var(--yellow); font-size: 10px; margin-left: 2px; }

  .main { flex: 1; overflow-y: auto; padding: 8px 0; }

  .section { margin-bottom: 12px; }
  .section-header {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 14px;
    font-size: 12px; font-weight: 600;
    color: var(--text-soft);
    text-transform: uppercase; letter-spacing: 0.04em;
    cursor: pointer; user-select: none;
  }
  .section-header:hover { color: var(--text); }
  .section-chevron {
    display: inline-block; transition: transform 0.15s ease;
    width: 12px; opacity: 0.6;
  }
  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }
  .section-color { width: 8px; height: 8px; border-radius: 50%; }
  .section-name { flex: 1; }
  .section-count { font-weight: 400; opacity: 0.7; }
  .section-body { padding: 2px 0; min-height: 12px; }
  .group-menu {
    opacity: 0; cursor: pointer;
    color: var(--text-faint);
    padding: 2px 6px; border-radius: 4px;
    font-size: 14px; line-height: 1;
    margin-left: 4px;
  }
  .section-header:hover .group-menu { opacity: 1; }
  .group-menu:hover { background: var(--bg-subtle); color: var(--text); }

  .task {
    display: flex; align-items: flex-start;
    padding: 6px 14px;
    gap: 10px; position: relative;
    border-radius: 3px;
    transition: background 0.05s;
  }
  .task:hover { background: var(--bg-hover); }
  .task.subtask { padding-left: 42px; }
  .task.snoozed { opacity: 0.45; }
  .drag-ghost { opacity: 0.3; background: var(--bg-subtle); }
  .drag-chosen { background: var(--bg-hover); }
  .dragging { opacity: 0.4; }

  .check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border-strong);
    border-radius: 50%;
    margin-top: 1px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.1s;
    background: transparent;
  }
  .check:hover { border-color: var(--text-soft); }
  .check.p1 { border-color: var(--yellow); }
  .check.p2 { border-color: var(--orange); }
  .check.p3 { border-color: var(--red); background: rgba(224, 62, 62, 0.06); }
  .check.recurring { border-style: dashed; }
  .check.done { background: var(--text-soft); border-color: var(--text-soft); }
  .check.done::after {
    content: ''; width: 5px; height: 9px;
    border: solid white; border-width: 0 2px 2px 0;
    transform: rotate(45deg); margin-bottom: 2px;
  }

  .task-body { flex: 1; min-width: 0; }
  .task-title {
    background: none; border: none;
    color: var(--text); font-size: 14px;
    width: 100%; padding: 0;
    font-family: inherit; outline: none;
  }
  .task.done .task-title { color: var(--text-faint); text-decoration: line-through; }
  .task-meta {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 2px; font-size: 12px;
    color: var(--text-soft);
  }
  .task-meta .chip { display: inline-flex; align-items: center; gap: 4px; }
  .task-meta .chip.due-chip { opacity: 0.75; }
  .task-meta .overdue { color: var(--red); opacity: 1; }
  .task-meta .today { color: var(--orange); font-weight: 500; }
  .task-meta .group-tag::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--dot, var(--text-faint));
    margin-right: 4px;
  }
  .task-actions {
    display: flex; gap: 1px;
    opacity: 0; transition: opacity 0.1s;
  }
  .task:hover .task-actions, .task:focus-within .task-actions { opacity: 1; }
  .task-actions button {
    background: none; border: none; cursor: pointer;
    width: 26px; height: 26px;
    color: var(--text-faint); border-radius: 4px;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .task-actions button:hover { background: var(--bg-subtle); color: var(--text); }

  .add-row { padding: 6px 14px; }
  .add-task-btn {
    display: flex; align-items: center; gap: 8px;
    background: none; border: none;
    color: var(--text-soft); cursor: pointer;
    padding: 4px 0; font-size: 14px;
    width: 100%; text-align: left;
  }
  .add-task-btn:hover { color: var(--accent); }
  .add-task-btn .plus {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; line-height: 1;
  }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15, 15, 15, 0.3);
    display: none;
    align-items: flex-start; justify-content: center;
    padding-top: 15vh; z-index: 50;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg); border-radius: 8px;
    box-shadow: var(--shadow);
    width: 90%; max-width: 520px;
    border: 1px solid var(--border);
    overflow: visible; position: relative;
  }
  .modal-input {
    width: 100%; background: none; border: none; outline: none;
    padding: 16px 18px 8px;
    font-size: 16px; color: var(--text);
    font-family: inherit; font-weight: 500;
  }
  .modal-notes {
    width: 100%; background: none; border: none; outline: none;
    padding: 0 18px 12px;
    font-size: 13px; color: var(--text-soft);
    font-family: inherit; resize: none;
    min-height: 20px;
  }
  .modal-tools {
    display: flex; gap: 4px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .pill {
    background: none; border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 14px;
    cursor: pointer; font-size: 12px;
    color: var(--text-soft);
    display: flex; align-items: center; gap: 4px;
  }
  .pill:hover { border-color: var(--border-strong); color: var(--text); }
  .pill.active {
    background: var(--bg-subtle); color: var(--text);
    border-color: var(--border-strong);
  }
  .pill.p1 { color: var(--yellow); }
  .pill.p2 { color: var(--orange); }
  .pill.p3 { color: var(--red); }
  .modal-footer {
    display: flex; justify-content: flex-end; gap: 6px;
    padding: 8px 12px; background: var(--bg-subtle);
  }
  .btn {
    padding: 6px 12px; border-radius: 5px;
    border: 1px solid var(--border-strong); background: var(--bg);
    cursor: pointer; font-size: 13px; color: var(--text);
  }
  .btn:hover { background: var(--bg-hover); }
  .btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .btn.primary:hover { opacity: 0.9; }

  .popover {
    position: absolute;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    z-index: 200;
    padding: 6px;
    min-width: 220px;
  }
  .quick-list { display: flex; flex-direction: column; }
  .quick-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px;
    cursor: pointer; border-radius: 4px;
    font-size: 13px; color: var(--text);
  }
  .quick-item:hover { background: var(--bg-hover); }
  .quick-item .label { flex: 1; }
  .quick-item .hint { color: var(--text-faint); font-size: 12px; }
  .quick-item.danger { color: var(--red); }
  .quick-item .swatch { width: 10px; height: 10px; border-radius: 50%; }

  .cal {
    border-top: 1px solid var(--border);
    margin-top: 4px; padding-top: 6px;
  }
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 6px 8px;
  }
  .cal-title { font-weight: 600; font-size: 13px; }
  .cal-nav {
    background: none; border: none;
    width: 24px; height: 24px;
    border-radius: 4px; cursor: pointer;
    color: var(--text-soft);
  }
  .cal-nav:hover { background: var(--bg-hover); color: var(--text); }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 1px; padding: 0 2px 4px;
  }
  .cal-dow {
    text-align: center; font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase; padding: 2px 0;
    font-weight: 600;
  }
  .cal-day {
    text-align: center; padding: 5px 0;
    border-radius: 4px; cursor: pointer;
    font-size: 12px; color: var(--text);
  }
  .cal-day:hover { background: var(--bg-hover); }
  .cal-day.other-month { color: var(--text-faint); }
  .cal-day.today { color: var(--accent); font-weight: 600; }
  .cal-day.selected { background: var(--accent); color: white; }

  .menu {
    position: absolute;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow);
    padding: 4px;
    min-width: 200px; z-index: 200;
  }
  .menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    cursor: pointer; border-radius: 4px;
    font-size: 13px; color: var(--text);
  }
  .menu-item:hover { background: var(--bg-hover); }
  .menu-item .icon { width: 16px; text-align: center; }
  .menu-separator { height: 1px; background: var(--border); margin: 4px 0; }

  .filter-panel {
    position: absolute;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    width: 280px; z-index: 200;
    padding: 12px;
  }
  .filter-panel h4 {
    margin: 0 0 6px; font-size: 11px;
    text-transform: uppercase; color: var(--text-soft);
    font-weight: 600; letter-spacing: 0.04em;
  }
  .fp-section { margin-bottom: 12px; }
  .fp-section:last-child { margin-bottom: 0; }
  .filter-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-chip-btn {
    background: var(--bg); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 12px;
    cursor: pointer; font-size: 12px;
    color: var(--text-soft);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .filter-chip-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .filter-chip-btn.active {
    background: var(--accent); color: white;
    border-color: var(--accent);
  }
  .filter-chip-btn .swatch {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .filter-search {
    width: 100%; padding: 6px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px; color: var(--text);
    font-family: inherit; outline: none;
  }
  .filter-search:focus { border-color: var(--accent); }
  .filter-toggle {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; font-size: 13px;
  }
  .filter-toggle input { margin: 0; }
  .filter-actions {
    display: flex; gap: 6px; margin-top: 12px;
    border-top: 1px solid var(--border); padding-top: 10px;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
  }
  .emoji {
    background: none; border: none;
    width: 28px; height: 28px;
    border-radius: 4px; cursor: pointer;
    font-size: 16px; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .emoji:hover { background: var(--bg-hover); }

  .empty {
    text-align: center; color: var(--text-faint);
    padding: 40px 20px; font-size: 13px;
  }
  .empty-emoji { font-size: 32px; margin-bottom: 8px; opacity: 0.6; }

  body.compact .header { padding: 6px 8px; }
  body.compact .task { padding: 5px 10px; }
  body.compact .add-row { padding: 4px 10px; }
  body.compact .section-header { padding: 3px 10px; }
  body.compact .view-tab { padding: 4px 7px; font-size: 12px; }

  .main::-webkit-scrollbar { width: 8px; }
  .main::-webkit-scrollbar-thumb {
    background: var(--border-strong); border-radius: 4px;
  }
  .main::-webkit-scrollbar-track { background: transparent; }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--text-soft);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="view-tabs">
      <button class="view-tab active" data-view="today">
        Today <span class="count" id="count-today">0</span>
      </button>
      <button class="view-tab" data-view="upcoming">
        Upcoming <span class="count" id="count-upcoming">0</span>
      </button>
      <button class="view-tab" data-view="all">
        All <span class="count" id="count-all">0</span>
      </button>
    </div>
    <button class="filter-btn" id="filterBtn" title="Filters (F)">⚲ Filter</button>
    <button class="icon-btn" id="newGroupBtn" title="New group">⊞</button>
    <button class="icon-btn" id="quickAddBtn" title="Quick add (Q)">＋</button>
  </div>
  <div class="preset-bar" id="presetBar"></div>
  <div class="main" id="content"></div>
</div>

<div class="modal-backdrop" id="inputModalBackdrop">
  <div class="modal" style="max-width:400px;">
    <div style="padding:14px 18px 4px;">
      <div id="inputModalTitle" style="font-weight:600;font-size:14px;margin-bottom:10px;"></div>
      <input id="inputModalField" class="modal-input" style="padding:8px 10px;border:1px solid var(--border);border-radius:5px;font-size:14px;" />
      <input id="inputModalField2" class="modal-input" style="padding:8px 10px;border:1px solid var(--border);border-radius:5px;font-size:14px;margin-top:8px;display:none;" />
    </div>
    <div class="modal-footer">
      <button class="btn" id="inputModalCancel">Cancel</button>
      <button class="btn primary" id="inputModalOk">OK</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <input class="modal-input" id="modalTitle" placeholder="Task name" autocomplete="off"/>
    <textarea class="modal-notes" id="modalNotes" placeholder="Description (optional)"></textarea>
    <div class="modal-tools">
      <button class="pill" id="modalDate">📅 <span>Do</span></button>
      <button class="pill" id="modalDueDate">⏰ <span>Due</span></button>
      <button class="pill" id="modalPriority">⚑ <span>Priority</span></button>
      <button class="pill" id="modalGroup">⊞ <span>Group</span></button>
      <button class="pill" id="modalRecurrence">🔁 <span>Repeat</span></button>
    </div>
    <div class="modal-footer">
      <button class="btn" id="modalCancel">Cancel</button>
      <button class="btn primary" id="modalSave">Add task</button>
    </div>
  </div>
</div>

<script>
// =============================================================
// CONFIG — replace with YOUR worker URL (no trailing slash!)
// =============================================================
const WORKER_URL = 'https://task-worker.lunxjiang.workers.dev';

let userId = new URLSearchParams(location.search).get('user')
  || localStorage.getItem('userId');
if (!userId) {
  userId = crypto.randomUUID();
  localStorage.setItem('userId', userId);
}

let groups = [], tasks = [], presets = [];
let currentView = 'today';
let collapsedSections = JSON.parse(localStorage.getItem('collapsed') || '[]');
collapsedSections = collapsedSections.filter(k => typeof k === 'string' && k.includes(':'));
localStorage.setItem('collapsed', JSON.stringify(collapsedSections));

let openPopover = null;
let sortableInstances = [];

const EMOJI_SET = [
  '🔥','⭐','✨','💼','🏠','📚','💪','🎯','📅','⏰',
  '🚀','💡','📌','🎨','🛒','✈️','🍔','🏋️','🎮','📝',
  '💰','🩺','🐶','🌱','☀️','🌙','❤️','⚡','🔔','✅',
];

function getURLFilters() {
  const p = new URLSearchParams(location.search);
  return {
    view: p.get('view') || 'today',
    group: p.get('group') || null,
    priority: p.get('priority'),
    search: p.get('q') || '',
    hideCompleted: p.get('done') !== '1',
    noDateOnly: p.get('nodate') === '1',
    snoozedOnly: p.get('snoozed') === '1',
  };
}
function updateURL(updates) {
  const p = new URLSearchParams(location.search);
  for (const [k, v] of Object.entries(updates)) {
    if (v === null || v === '' || v === undefined) p.delete(k);
    else p.set(k, v);
  }
  history.replaceState(null, '', location.pathname + (p.toString() ? '?' + p.toString() : ''));
}
let filters = getURLFilters();
currentView = filters.view;

const api = async (path, opts = {}) => {
  const res = await fetch(WORKER_URL + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'X-User-Id': userId,
      ...(opts.headers || {}),
    },
  });
  return res.json();
};

const escapeHtml = s => (s || '').replace(/[&<>"]/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function startOfDay(ts = Date.now()) { const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function endOfDay(ts = Date.now()) { const d = new Date(ts); d.setHours(23,59,59,999); return d.getTime(); }

function parseNL(input) {
  let text = input;
  let due_date = null, do_date = null, priority = 0, group_name = null, recurrence = null;

  const pMatch = text.match(/\s(p|!)([123])\b/i);
  if (pMatch) { priority = parseInt(pMatch[2]); text = text.replace(pMatch[0], ''); }

  const gMatch = text.match(/(?:^|\s)#([a-z0-9_-]+)/i);
  if (gMatch) { group_name = gMatch[1]; text = text.replace(gMatch[0], '').trim(); }

  const recurrencePatterns = [
    { re: /\b(every day|daily)\b/i, val: 'daily' },
    { re: /\b(every week|weekly)\b/i, val: 'weekly' },
    { re: /\b(every weekday|weekdays)\b/i, val: 'weekdays' },
    { re: /\b(every month|monthly)\b/i, val: 'monthly' },
    { re: /\bevery (\d+) days?\b/i, val: (m) => `every-${m[1]}-days` },
  ];
  for (const r of recurrencePatterns) {
    const m = text.match(r.re);
    if (m) {
      recurrence = typeof r.val === 'function' ? r.val(m) : r.val;
      text = text.replace(r.re, '').trim();
      break;
    }
  }

  const now = new Date();
  const currentYear = now.getFullYear();
  const setDate = (o) => {
    const d = new Date(now); d.setDate(d.getDate() + o);
    d.setHours(23, 59, 0, 0); return d.getTime();
  };
  const setDay = (target) => {
    const d = new Date(now);
    const diff = (target - d.getDay() + 7) % 7 || 7;
    d.setDate(d.getDate() + diff);
    d.setHours(23, 59, 0, 0); return d.getTime();
  };
  const setMD = (month, day, year) => {
    let y = year || currentYear;
    const d = new Date(y, month - 1, day, 23, 59, 0);
    if (!year && d.getTime() < startOfDay()) d.setFullYear(currentYear + 1);
    return d.getTime();
  };

  const datePatterns = [
    { re: /\btoday\b/i, fn: () => setDate(0) },
    { re: /\b(tomorrow|tmrw)\b/i, fn: () => setDate(1) },
    { re: /\bnext week\b/i, fn: () => setDate(7) },
    { re: /\bin (\d+) days?\b/i, fn: (m) => setDate(parseInt(m[1])) },
    { re: /\bmon(day)?\b/i, fn: () => setDay(1) },
    { re: /\btue(s|sday)?\b/i, fn: () => setDay(2) },
    { re: /\bwed(nesday)?\b/i, fn: () => setDay(3) },
    { re: /\bthu(rs|rsday)?\b/i, fn: () => setDay(4) },
    { re: /\bfri(day)?\b/i, fn: () => setDay(5) },
    { re: /\bsat(urday)?\b/i, fn: () => setDay(6) },
    { re: /\bsun(day)?\b/i, fn: () => setDay(0) },
    { re: /\b(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})\b/, fn: (m) => {
      let y = parseInt(m[3]);
      if (y < 100) y += 2000;
      return setMD(parseInt(m[1]), parseInt(m[2]), y);
    }},
    { re: /\b(\d{1,2})[\/\-](\d{1,2})\b/, fn: (m) =>
      setMD(parseInt(m[1]), parseInt(m[2]))
    },
  ];

  // Look for "by <date>" first (deadline)
  for (const p of datePatterns) {
    const patternSource = p.re.source;
    const withBy = new RegExp('\\bby\\s+(' + patternSource + ')', 'i');
    const m = text.match(withBy);
    if (m) {
      const innerMatch = m[0].replace(/^by\s+/i, '').match(p.re);
      if (innerMatch) {
        due_date = p.fn(innerMatch);
        text = text.replace(m[0], '').trim();
        break;
      }
    }
  }

  // Then look for do date (any remaining date reference)
  for (const p of datePatterns) {
    const m = text.match(p.re);
    if (m) {
      do_date = p.fn(m);
      const onPrefix = new RegExp('\\bon\\s+' + m[0].replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
      const onMatch = text.match(onPrefix);
      if (onMatch) {
        text = text.replace(onMatch[0], '').trim();
      } else {
        text = text.replace(m[0], '').trim();
      }
      break;
    }
  }

  return { title: text.trim(), due_date, do_date, priority, group_name, recurrence };
}

function nextRecurrence(currentDue, recurrence) {
  const base = currentDue ? new Date(currentDue) : new Date();
  base.setHours(23, 59, 0, 0);

  if (recurrence === 'daily') {
    base.setDate(base.getDate() + 1);
    return base.getTime();
  }
  if (recurrence === 'weekly') {
    base.setDate(base.getDate() + 7);
    return base.getTime();
  }
  if (recurrence === 'monthly') {
    base.setMonth(base.getMonth() + 1);
    return base.getTime();
  }
  if (recurrence === 'weekdays') {
    do { base.setDate(base.getDate() + 1); }
    while (base.getDay() === 0 || base.getDay() === 6);
    return base.getTime();
  }
  const m = /^every-(\d+)-days$/.exec(recurrence);
  if (m) {
    base.setDate(base.getDate() + parseInt(m[1]));
    return base.getTime();
  }
  return null;
}

function recurrenceLabel(recurrence) {
  if (!recurrence) return 'Repeat';
  if (recurrence === 'daily') return 'Daily';
  if (recurrence === 'weekly') return 'Weekly';
  if (recurrence === 'weekdays') return 'Weekdays';
  if (recurrence === 'monthly') return 'Monthly';
  const m = /^every-(\d+)-days$/.exec(recurrence);
  if (m) return `Every ${m[1]} days`;
  return recurrence;
}

function formatDate(ts) {
  if (!ts) return null;
  const today = startOfDay();
  const diff = Math.floor((startOfDay(ts) - today) / 86400000);
  if (diff < 0) return { text: `${-diff}d ago`, cls: 'overdue' };
  if (diff === 0) return { text: 'Today', cls: 'today' };
  if (diff === 1) return { text: 'Tomorrow', cls: '' };
  if (diff < 7) {
    const d = new Date(ts);
    return { text: d.toLocaleDateString('en', { weekday: 'short' }), cls: '' };
  }
  const d = new Date(ts);
  return { text: `${d.toLocaleString('en', { month: 'short' })} ${d.getDate()}`, cls: '' };
}

function isVisible(t) {
  if (t.snooze_until && t.snooze_until > Date.now()) return false;
  return true;
}

function viewFilter(t) {
  if (t.parent_id) return false;

  if (filters.snoozedOnly) {
    if (!t.snooze_until || t.snooze_until <= Date.now()) return false;
  } else {
    if (!isVisible(t)) return false;
  }

  if (t.done && filters.hideCompleted) return false;
  if (filters.noDateOnly && (t.do_date || t.due_date)) return false;

  if (filters.group) {
    const g = groups.find(x =>
      x.id === filters.group ||
      x.name.toLowerCase() === filters.group.toLowerCase()
    );
    if (!g || t.group_id !== g.id) return false;
  }
  if (filters.priority && (t.priority || 0) !== parseInt(filters.priority)) return false;
  if (filters.search) {
    const q = filters.search.toLowerCase();
    if (!t.title.toLowerCase().includes(q) && !(t.notes || '').toLowerCase().includes(q)) return false;
  }

  // Today: tasks I plan to do today (do_date <= today), OR tasks due today with no do_date
  if (currentView === 'today') {
    const doToday = t.do_date && t.do_date <= endOfDay();
    const dueTodayNoDo = !t.do_date && t.due_date && t.due_date <= endOfDay();
    return doToday || dueTodayNoDo;
  }
  if (currentView === 'upcoming') {
    const doLater = t.do_date && t.do_date > endOfDay();
    const dueLaterNoDo = !t.do_date && t.due_date && t.due_date > endOfDay();
    return doLater || dueLaterNoDo;
  }
  if (currentView === 'overdue') return t.due_date && t.due_date < startOfDay() && !t.done;
  return true;
}

async function load() {
  try {
    const [g, t, p] = await Promise.all([
      api('/groups'), api('/tasks'), api('/presets')
    ]);
    groups = Array.isArray(g) ? g : [];
    tasks = Array.isArray(t) ? t : [];
    presets = Array.isArray(p) ? p : [];
  } catch (err) {
    console.error('Load failed:', err);
    groups = []; tasks = []; presets = [];
  }
  render();
}

function getCounts() {
  const c = { today: 0, upcoming: 0, all: 0 };
  for (const t of tasks) {
    if (t.parent_id || t.done || !isVisible(t)) continue;
    c.all++;
    const doToday = t.do_date && t.do_date <= endOfDay();
    const doLater = t.do_date && t.do_date > endOfDay();
    const dueTodayNoDo = !t.do_date && t.due_date && t.due_date <= endOfDay();
    const dueLaterNoDo = !t.do_date && t.due_date && t.due_date > endOfDay();
    if (doToday || dueTodayNoDo) c.today++;
    else if (doLater || dueLaterNoDo) c.upcoming++;
  }
  return c;
}

function getSmartPresets() {
  const smart = [];
  const now = Date.now();
  const weekFromNow = now + 7 * 86400000;
  const counts = { overdue: 0, thisWeek: 0, noDate: 0, p3: 0 };
  for (const t of tasks) {
    if (t.parent_id || t.done || (t.snooze_until && t.snooze_until > now)) continue;
    if (t.due_date && t.due_date < startOfDay()) counts.overdue++;
    const anyDate = t.do_date || t.due_date;
    if (anyDate && anyDate >= startOfDay() && anyDate <= weekFromNow) counts.thisWeek++;
    if (!t.do_date && !t.due_date) counts.noDate++;
    if ((t.priority || 0) === 3) counts.p3++;
  }
  if (counts.overdue) smart.push({ id: '__smart_overdue', name: 'Overdue', icon: '⚠️', smart: true, count: counts.overdue, filters: { view: 'overdue', group: null, priority: null, search: '', hideCompleted: true } });
  if (counts.p3) smart.push({ id: '__smart_p3', name: 'High priority', icon: '🔥', smart: true, count: counts.p3, filters: { view: 'all', group: null, priority: '3', search: '', hideCompleted: true } });
  if (counts.thisWeek) smart.push({ id: '__smart_week', name: 'This week', icon: '📆', smart: true, count: counts.thisWeek, filters: { view: 'upcoming', group: null, priority: null, search: '', hideCompleted: true } });
  if (counts.noDate) smart.push({ id: '__smart_nodate', name: 'No date', icon: '🚫', smart: true, count: counts.noDate, filters: { view: 'all', group: null, priority: null, search: '', hideCompleted: true }, special: 'no-date' });

  let snoozedCount = 0;
  for (const t of tasks) {
    if (t.parent_id || t.done) continue;
    if (t.snooze_until && t.snooze_until > now) snoozedCount++;
  }
  if (snoozedCount) {
    smart.push({
      id: '__smart_snoozed', name: 'Snoozed', icon: '💤', smart: true,
      count: snoozedCount,
      filters: { view: 'all', group: null, priority: null, search: '', hideCompleted: true },
      special: 'snoozed-only',
    });
  }

  return smart;
}

function render() {
  const c = getCounts();
  document.getElementById('count-today').textContent = c.today;
  document.getElementById('count-upcoming').textContent = c.upcoming;
  document.getElementById('count-all').textContent = c.all;
  document.querySelectorAll('.view-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.view === currentView));

  renderPresets();
  updateFilterBtn();

  const root = document.getElementById('content');
  root.innerHTML = '';
  const filtered = tasks.filter(viewFilter);

  if (filtered.length === 0 && currentView !== 'all') {
    root.innerHTML = `<div class="empty">
      <div class="empty-emoji">${currentView === 'today' ? '☀️' : '📅'}</div>
      ${currentView === 'today' ? 'Nothing to do today. Nice.' : 'No upcoming tasks.'}
    </div>`;
    const add = document.createElement('div');
    add.className = 'add-row';
    add.innerHTML = `<button class="add-task-btn" data-add-group=""><span class="plus">+</span> Add task</button>`;
    root.appendChild(add);
    return;
  }

  if (currentView === 'all') {
    const byGroup = new Map();
    const ungrouped = [];
    for (const t of filtered) {
      if (t.group_id) {
        if (!byGroup.has(t.group_id)) byGroup.set(t.group_id, []);
        byGroup.get(t.group_id).push(t);
      } else ungrouped.push(t);
    }

    if (filters.group) {
      const g = groups.find(x =>
        x.id === filters.group ||
        x.name.toLowerCase() === filters.group.toLowerCase()
      );
      if (g) {
        renderSection(g.id, g.name, g.color, byGroup.get(g.id) || [], root);
      } else {
        root.innerHTML = `<div class="empty"><div class="empty-emoji">🔍</div>Group not found.</div>`;
      }
    } else {
      for (const g of groups) {
        renderSection(g.id, g.name, g.color, byGroup.get(g.id) || [], root);
      }
      if (ungrouped.length || groups.length === 0) {
        renderSection(null, 'Inbox', 'var(--text-faint)', ungrouped, root);
      }
    }
  } else {
    renderSection(null,
      currentView === 'today' ? 'Today' : currentView === 'upcoming' ? 'Upcoming' : 'Overdue',
      'var(--text-faint)', filtered, root, true);
  }

  initSortable();
}

function renderSection(id, name, color, taskList, root, hideHeader = false) {
  const section = document.createElement('div');
  section.className = 'section';
  const sectionKey = (id || 'none') + ':' + currentView;
  if (!hideHeader && collapsedSections.includes(sectionKey)) section.classList.add('collapsed');
  if (!hideHeader) {
    section.innerHTML = `<div class="section-header" data-section="${sectionKey}">
      <span class="section-chevron">▾</span>
      <span class="section-color" style="background:${color}"></span>
      <span class="section-name">${escapeHtml(name)}</span>
      <span class="section-count">${taskList.length}</span>
      ${id ? `<span class="group-menu" data-group-menu="${id}" title="Group options">⋯</span>` : ''}
    </div>`;
  }
  const body = document.createElement('div');
  body.className = 'section-body';
  body.dataset.groupId = id || '';
  taskList.forEach(t => renderTask(t, body));
  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  addRow.innerHTML = `<button class="add-task-btn" data-add-group="${id || ''}">
    <span class="plus">+</span> Add task</button>`;
  body.appendChild(addRow);
  section.appendChild(body);
  root.appendChild(section);
}

function renderTask(t, container, isSub = false) {
  const div = document.createElement('div');
  div.className = `task ${t.done ? 'done' : ''} ${isSub ? 'subtask' : ''} ${t.snooze_until && t.snooze_until > Date.now() ? 'snoozed' : ''}`;
  div.dataset.id = t.id;
  div.dataset.parentId = t.parent_id || '';
  const doFmt = formatDate(t.do_date);
  const dueFmt = formatDate(t.due_date);
  const group = groups.find(g => g.id === t.group_id);
  const prio = t.priority || 0;
  const isRecurring = !!t.recurrence;

  // If do_date and due_date are same day, just show the do chip
  const sameDay = t.do_date && t.due_date && startOfDay(t.do_date) === startOfDay(t.due_date);
  const showDo = t.do_date;
  const showDue = t.due_date && !sameDay;

  div.innerHTML = `
    <div class="check ${prio ? 'p' + prio : ''} ${isRecurring ? 'recurring' : ''} ${t.done ? 'done' : ''}" data-check="${t.id}" title="${isRecurring ? 'Recurring task — completing bumps the date' : ''}"></div>
    <div class="task-body">
      <input class="task-title" value="${escapeHtml(t.title)}" data-edit="${t.id}">
      <div class="task-meta">
        ${showDo ? `<span class="chip ${doFmt.cls}">📅 ${doFmt.text}</span>` : ''}
        ${showDue ? `<span class="chip due-chip ${dueFmt.cls}">⏰ due ${dueFmt.text}</span>` : ''}
        ${isRecurring ? `<span class="chip">🔁 ${escapeHtml(recurrenceLabel(t.recurrence))}</span>` : ''}
        ${t.snooze_until && t.snooze_until > Date.now() ? `<span class="chip" style="color:var(--accent)">💤 until ${new Date(t.snooze_until).toLocaleDateString()}</span>` : ''}
        ${group && currentView !== 'all' ? `<span class="chip group-tag" style="--dot:${group.color}">${escapeHtml(group.name)}</span>` : ''}
        ${t.notes ? `<span class="chip">📝</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      ${!isSub ? `<button data-breakdown="${t.id}" title="AI breakdown">✨</button>` : ''}
      <button data-menu="${t.id}" title="More">⋯</button>
    </div>
  `;
  container.appendChild(div);
  const subs = tasks.filter(x => x.parent_id === t.id && isVisible(x));
  subs.forEach(s => renderTask(s, container, true));
}

function initSortable() {
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];
  document.querySelectorAll('.section-body').forEach(body => {
    const s = Sortable.create(body, {
      group: 'tasks', animation: 150,
      draggable: '.task:not(.subtask)',
      filter: '.add-row',
      ghostClass: 'drag-ghost', chosenClass: 'drag-chosen', dragClass: 'dragging',
      delay: 150, delayOnTouchOnly: true, touchStartThreshold: 5,
      onEnd: async (evt) => {
        const movedId = evt.item.dataset.id;
        const newGroupId = evt.to.dataset.groupId || null;
        const movedTask = tasks.find(t => t.id === movedId);
        if (!movedTask) return;
        const siblings = Array.from(evt.to.querySelectorAll(':scope > .task:not(.subtask)'))
          .map(el => el.dataset.id);
        movedTask.group_id = newGroupId;
        siblings.forEach((id, i) => {
          const t = tasks.find(x => x.id === id);
          if (t) t.sort_order = i;
        });
        await Promise.all(siblings.map((id, i) =>
          api('/tasks/' + id, {
            method: 'PUT',
            body: JSON.stringify({ sort_order: i, group_id: newGroupId }),
          })
        ));
      },
    });
    sortableInstances.push(s);
  });
}

function renderPresets() {
  const bar = document.getElementById('presetBar');
  bar.innerHTML = '';
  const all = [...getSmartPresets(), ...presets];
  const currentMatch = all.find(p =>
    p.filters.view === currentView &&
    (p.filters.group || null) === (filters.group || null) &&
    (p.filters.priority || null) === (filters.priority || null) &&
    (p.filters.search || '') === (filters.search || '') &&
    !!p.filters.hideCompleted === !!filters.hideCompleted
  );
  for (const p of all) {
    const el = document.createElement('div');
    el.className = 'preset' + (currentMatch?.id === p.id ? ' active' : '') + (p.smart ? ' smart' : '');
    el.dataset.id = p.id;
    const countBadge = p.count !== undefined ? `<span class="preset-count">${p.count}</span>` : '';
    el.innerHTML = `
      <span data-apply="${p.id}">
        ${p.icon ? p.icon + ' ' : ''}${escapeHtml(p.name)}${countBadge}
        ${p.is_default ? '<span class="default-marker" title="Default view">★</span>' : ''}
      </span>
      ${!p.smart ? `<span class="preset-menu" data-preset-menu="${p.id}">⋯</span>` : ''}
    `;
    bar.appendChild(el);
  }
  const hasFilters = filters.group || filters.priority || filters.search || currentView !== 'today';
  if (hasFilters) {
    const add = document.createElement('button');
    add.className = 'preset-add';
    add.id = 'addPresetFromCurrent';
    add.textContent = '+ Save current';
    bar.appendChild(add);
  }
  initPresetSortable();
}

function initPresetSortable() {
  const bar = document.getElementById('presetBar');
  if (bar._sortable) bar._sortable.destroy();
  bar._sortable = Sortable.create(bar, {
    animation: 150, draggable: '.preset:not(.smart)',
    filter: '.preset-add, .preset.smart',
    delay: 150, delayOnTouchOnly: true,
    onEnd: async () => {
      const order = Array.from(bar.querySelectorAll('.preset:not(.smart)')).map(el => el.dataset.id);
      await Promise.all(order.map((id, i) =>
        api('/presets/' + id, { method: 'PUT', body: JSON.stringify({ sort_order: i }) })
      ));
      presets = order.map(id => presets.find(p => p.id === id)).filter(Boolean);
    },
  });
}

function updateFilterBtn() {
  const btn = document.getElementById('filterBtn');
  const hasFilters = filters.group || filters.priority || filters.search || !filters.hideCompleted;
  btn.classList.toggle('has-filters', !!hasFilters);
  btn.querySelector('.dot')?.remove();
  if (hasFilters) btn.insertAdjacentHTML('beforeend', '<span class="dot"></span>');
}

function toast(message) {
  const el = document.createElement('div');
  el.style.cssText = `
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--text); color: var(--bg);
    padding: 8px 16px; border-radius: 6px;
    font-size: 13px; z-index: 1000;
    box-shadow: var(--shadow);
  `;
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function customPrompt({ title, placeholder = '', defaultValue = '', second = null }) {
  return new Promise((resolve) => {
    const backdrop = document.getElementById('inputModalBackdrop');
    const titleEl = document.getElementById('inputModalTitle');
    const field = document.getElementById('inputModalField');
    const field2 = document.getElementById('inputModalField2');
    const ok = document.getElementById('inputModalOk');
    const cancel = document.getElementById('inputModalCancel');

    titleEl.textContent = title;
    field.placeholder = placeholder;
    field.value = defaultValue;

    if (second) {
      field2.style.display = 'block';
      field2.placeholder = second.placeholder || '';
      field2.value = second.defaultValue || '';
    } else {
      field2.style.display = 'none';
    }

    backdrop.classList.add('open');
    setTimeout(() => field.focus(), 10);

    const cleanup = (result) => {
      backdrop.classList.remove('open');
      ok.onclick = null; cancel.onclick = null;
      field.onkeydown = null;
      if (field2) field2.onkeydown = null;
      resolve(result);
    };

    ok.onclick = () => {
      if (second) cleanup({ value: field.value.trim(), value2: field2.value.trim() });
      else cleanup(field.value.trim() || null);
    };
    cancel.onclick = () => cleanup(null);
    field.onkeydown = (e) => {
      if (e.key === 'Enter') ok.click();
      if (e.key === 'Escape') cancel.click();
    };
    if (field2) field2.onkeydown = field.onkeydown;
  });
}

function closePopover() {
  if (openPopover) { openPopover.remove(); openPopover = null; }
}
function showPopover(anchorEl, contentEl) {
  closePopover();
  const pop = document.createElement('div');
  pop.className = 'popover';
  pop.appendChild(contentEl);
  document.body.appendChild(pop);
  const rect = anchorEl.getBoundingClientRect();
  pop.style.visibility = 'hidden';
  const pw = pop.offsetWidth, ph = pop.offsetHeight;
  let left = rect.left;
  let top = rect.bottom + 4;
  if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
  if (top + ph > window.innerHeight - 8) top = rect.top - ph - 4;
  if (top < 8) top = 8;
  if (left < 8) left = 8;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
  pop.style.visibility = 'visible';
  openPopover = pop;
  return pop;
}

function buildDatePicker(currentTs, onPick) {
  const wrap = document.createElement('div');
  const quick = document.createElement('div');
  quick.className = 'quick-list';
  const options = [
    { label: 'Today', icon: '📅', ts: endOfDay() },
    { label: 'Tomorrow', icon: '⏭', ts: endOfDay() + 86400000 },
    { label: 'Next week', icon: '📆', ts: endOfDay() + 7 * 86400000 },
    { label: 'No date', icon: '🚫', ts: null, danger: true },
  ];
  for (const opt of options) {
    const item = document.createElement('div');
    item.className = 'quick-item' + (opt.danger ? ' danger' : '');
    item.innerHTML = `<span class="icon">${opt.icon}</span><span class="label">${opt.label}</span>`;
    item.onclick = () => onPick(opt.ts);
    quick.appendChild(item);
  }
  wrap.appendChild(quick);
  const cal = document.createElement('div');
  cal.className = 'cal';
  wrap.appendChild(cal);
  let viewDate = currentTs ? new Date(currentTs) : new Date();
  viewDate.setDate(1);
  function drawCal() {
    cal.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'cal-header';
    header.innerHTML = `
      <button class="cal-nav" data-nav="-1">‹</button>
      <span class="cal-title">${viewDate.toLocaleDateString('en', { month: 'long', year: 'numeric' })}</span>
      <button class="cal-nav" data-nav="1">›</button>`;
    cal.appendChild(header);
    const grid = document.createElement('div');
    grid.className = 'cal-grid';
    ['S','M','T','W','T','F','S'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow'; el.textContent = d;
      grid.appendChild(el);
    });
    const startDow = viewDate.getDay();
    const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
    const prevMonthDays = new Date(viewDate.getFullYear(), viewDate.getMonth(), 0).getDate();
    const todayStart = startOfDay();
    const selectedStart = currentTs ? startOfDay(currentTs) : null;
    for (let i = startDow - 1; i >= 0; i--) {
      const d = prevMonthDays - i;
      const el = document.createElement('div');
      el.className = 'cal-day other-month'; el.textContent = d;
      const ts = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, d, 23, 59).getTime();
      el.onclick = () => onPick(ts);
      grid.appendChild(el);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const ts = new Date(viewDate.getFullYear(), viewDate.getMonth(), d, 23, 59).getTime();
      const el = document.createElement('div');
      el.className = 'cal-day';
      if (startOfDay(ts) === todayStart) el.classList.add('today');
      if (selectedStart && startOfDay(ts) === selectedStart) el.classList.add('selected');
      el.textContent = d;
      el.onclick = () => onPick(ts);
      grid.appendChild(el);
    }
    const cellsUsed = startDow + daysInMonth;
    const trailing = (7 - cellsUsed % 7) % 7;
    for (let d = 1; d <= trailing; d++) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month'; el.textContent = d;
      const ts = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, d, 23, 59).getTime();
      el.onclick = () => onPick(ts);
      grid.appendChild(el);
    }
    cal.appendChild(grid);
    header.querySelectorAll('.cal-nav').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        viewDate.setMonth(viewDate.getMonth() + parseInt(btn.dataset.nav));
        drawCal();
      };
    });
  }
  drawCal();
  return wrap;
}

      showPopover(anchorEl, buildDatePicker(t.due_date, async (ts) => {
        await api('/tasks/' + taskId, { method: 'PUT', body: JSON.stringify({ due_date: ts }) });

        await api('/tasks/' + taskId, { method: 'PUT', body: JSON.stringify({ group_id: gid }) });

      updates.snooze_until = Date.now() + 86400000;
      toast('Snoozed for 1 day. Find in 💤 Snoozed preset.');

      await api('/tasks/' + taskId, { method: 'DELETE' });
      closePopover(); load(); return;
    }
    await api('/tasks/' + taskId, { method: 'PUT', body: JSON.stringify(updates) });
    closePopover(); load();
  });
}

let modalState = {
  do_date: null,
  due_date: null,
  doExplicitlySet: false,
  dueExplicitlySet: false,
  priority: 0,
  group_id: null,
  parent_id: null,

function openQuickAdd(prefill = {}) {
  modalState = {
    do_date: endOfDay(),
    due_date: null,
    doExplicitlySet: false,
    dueExplicitlySet: false,
    priority: 0,
    group_id: null,
    parent_id: null,

}

  closePopover();

}

function updateModalPills() {
  const d = document.getElementById('modalDate');
  if (modalState.do_date) {
    d.querySelector('span').textContent = formatDate(modalState.do_date).text;
    d.classList.add('active');
  } else { d.querySelector('span').textContent = 'Do'; d.classList.remove('active'); }

  const due = document.getElementById('modalDueDate');
  if (modalState.due_date) {
    due.querySelector('span').textContent = 'due ' + formatDate(modalState.due_date).text;
    due.classList.add('active');
  } else { due.querySelector('span').textContent = 'Due'; due.classList.remove('active'); }

  const p = document.getElementById('modalPriority');
  p.className = 'pill' + (modalState.priority ? ' active p' + modalState.priority : '');
  p.querySelector('span').textContent = modalState.priority ? 'P' + modalState.priority : 'Priority';

  const g = document.getElementById('modalGroup');
  const grp = groups.find(x => x.id === modalState.group_id);
  if (grp) { g.querySelector('span').textContent = grp.name; g.classList.add('active'); }
  else { g.querySelector('span').textContent = 'Group'; g.classList.remove('active'); }

  const r = document.getElementById('modalRecurrence');
  if (modalState.recurrence) {
    r.querySelector('span').textContent = recurrenceLabel(modalState.recurrence);
    r.classList.add('active');
  } else {
    r.querySelector('span').textContent = 'Repeat';
    r.classList.remove('active');
  }
}

async function saveQuickAdd() {
  const raw = document.getElementById('modalTitle').value.trim();
  if (!raw) return;
  const parsed = parseNL(raw);

  let do_date;
  if (parsed.do_date) do_date = parsed.do_date;
  else if (modalState.doExplicitlySet) do_date = modalState.do_date;
  else do_date = modalState.do_date;

  const due_date = parsed.due_date || (modalState.dueExplicitlySet ? modalState.due_date : null);

  let group_id = modalState.group_id;
  if (!group_id && parsed.group_name) {
    const match = groups.find(g =>
      g.name.toLowerCase() === parsed.group_name.toLowerCase() ||
      g.name.toLowerCase().replace(/\s+/g, '') === parsed.group_name.toLowerCase()
    );
    if (match) group_id = match.id;
  }

  await api('/tasks', {
    method: 'POST',
    body: JSON.stringify({
      title: parsed.title || raw,
      notes: document.getElementById('modalNotes').value.trim() || null,
      do_date,
      due_date,
      priority: modalState.priority || parsed.priority,
      group_id,
      parent_id: modalState.parent_id,
      recurrence: modalState.recurrence || parsed.recurrence || null,
    }),
  });
  closeQuickAdd(); load();
}

document.getElementById('modalCancel').onclick = closeQuickAdd;
document.getElementById('modalSave').onclick = saveQuickAdd;
document.getElementById('modalBackdrop').onclick = (e) => {
  if (e.target.id === 'modalBackdrop') closeQuickAdd();
};
document.getElementById('modalTitle').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveQuickAdd(); }
  if (e.key === 'Escape') closeQuickAdd();
});
document.getElementById('modalDate').onclick = (e) => {
  e.stopPropagation();
  if (openPopover) { closePopover(); return; }
  showPopover(e.currentTarget, buildDatePicker(modalState.do_date, (ts) => {
    modalState.do_date = ts;
    modalState.doExplicitlySet = true;
    updateModalPills();
    closePopover();
  }));
};
document.getElementById('modalDueDate').onclick = (e) => {
  e.stopPropagation();
  if (openPopover) { closePopover(); return; }
  showPopover(e.currentTarget, buildDatePicker(modalState.due_date, (ts) => {
    modalState.due_date = ts;
    modalState.dueExplicitlySet = true;
    updateModalPills();
    closePopover();
  }));
};
document.getElementById('modalPriority').onclick = () => {
  modalState.priority = (modalState.priority + 1) % 4;
  updateModalPills();
};
document.getElementById('modalGroup').onclick = (e) => {
  e.stopPropagation();
  if (openPopover) { closePopover(); return; }
  showPopover(e.currentTarget, buildGroupPicker(modalState.group_id, (gid) => {
    modalState.group_id = gid; updateModalPills(); closePopover();
  }));
};
document.getElementById('modalRecurrence').onclick = (e) => {
  e.stopPropagation();
  if (openPopover) { closePopover(); return; }
  showPopover(e.currentTarget, buildRecurrencePicker(modalState.recurrence, (rec) => {
    modalState.recurrence = rec; updateModalPills(); closePopover();
  }));
};

document.addEventListener('click', async (e) => {
  const t = e.target;
  if (t.closest('.view-tab')) {
    currentView = t.closest('.view-tab').dataset.view;
    filters.view = currentView;
    updateURL({ view: currentView });
    render(); return;
  }
  if (t.dataset.groupMenu) {
    e.stopPropagation();
    showGroupMenu(t.dataset.groupMenu, t);
    return;
  }
  const sh = t.closest('.section-header');
  if (sh) {
    const id = sh.dataset.section;
    if (collapsedSections.includes(id)) collapsedSections = collapsedSections.filter(x => x !== id);
    else collapsedSections.push(id);
    localStorage.setItem('collapsed', JSON.stringify(collapsedSections));
    render(); return;
  }
  if (t.dataset.check) {
    const task = tasks.find(x => x.id === t.dataset.check);
    if (!task) return;

    // Recurring: bump whichever date drives the task
    if (task.recurrence && !task.done) {
      const baseDate = task.do_date || task.due_date;
      const next = nextRecurrence(baseDate, task.recurrence);
      if (next) {
        const updates = task.do_date ? { do_date: next } : { due_date: next };
        await api('/tasks/' + task.id, {
          method: 'PUT',
          body: JSON.stringify(updates),
        });
        toast(`🔁 Next: ${formatDate(next).text}`);
        load(); return;
      }
    }

    await api('/tasks/' + task.id, {
      method: 'PUT', body: JSON.stringify({ done: task.done ? 0 : 1 }),
    });
    load(); return;
  }
  const addBtn = t.closest('[data-add-group]');
  if (addBtn) {
    openQuickAdd({ group_id: addBtn.dataset.addGroup || null });
    return;
  }
  if (t.id === 'quickAddBtn') { openQuickAdd(); return; }
  if (t.id === 'newGroupBtn') {
    const result = await customPrompt({
      title: 'New group',
      placeholder: 'Group name',
      second: { placeholder: 'Color (hex)', defaultValue: '#2383e2' }
    });
    if (!result || !result.value) return;
    const color = result.value2 || '#2383e2';
    await api('/groups', { method: 'POST', body: JSON.stringify({ name: result.value, color }) });
    load(); return;
  }
  if (t.closest('#filterBtn')) {
    if (openPopover) closePopover(); else openFilterPanel();
    return;
  }
  if (t.dataset.breakdown) {
    const task = tasks.find(x => x.id === t.dataset.breakdown);
    t.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await api('/breakdown', {
        method: 'POST',
        body: JSON.stringify({ task: task.title, parent_id: task.id, group_id: task.group_id }),
      });
      if (res.error) {
        alert('AI breakdown failed: ' + res.error + (res.raw ? '\n\nRaw response:\n' + res.raw : ''));
      }
    } catch (err) {
      alert('Breakdown error: ' + err.message);
    }
    load(); return;
  }
  if (t.dataset.menu) { showTaskMenu(t.dataset.menu, t); return; }
  if (t.dataset.presetMenu) { showPresetMenu(t.dataset.presetMenu, t); return; }
  if (t.id === 'addPresetFromCurrent') {
    const name = await customPrompt({ title: 'Save preset', placeholder: 'Preset name' });
    if (!name) return;
    await api('/presets', {
      method: 'POST',
      body: JSON.stringify({
        name,
        filters: {
          view: currentView, group: filters.group, priority: filters.priority,
          search: filters.search, hideCompleted: filters.hideCompleted,
        },
      }),
    });
    load(); return;
  }
  if (t.dataset.apply) {
    const all = [...getSmartPresets(), ...presets];
    const p = all.find(x => x.id === t.dataset.apply);
    if (!p) return;
    currentView = p.filters.view || 'all';
    filters = {
      view: currentView,
      group: p.filters.group || null,
      priority: p.filters.priority || null,
      search: p.filters.search || '',
      hideCompleted: p.filters.hideCompleted !== false,
      noDateOnly: p.special === 'no-date',
      snoozedOnly: p.special === 'snoozed-only',
    };
    updateURL({
      view: currentView,
      group: filters.group, priority: filters.priority,
      q: filters.search || null,
      done: filters.hideCompleted ? null : '1',
      nodate: filters.noDateOnly ? '1' : null,
      snoozed: filters.snoozedOnly ? '1' : null,
    });
    render(); return;
  }
});

let editTimer;
document.addEventListener('input', (e) => {
  if (e.target.dataset.edit) {
    clearTimeout(editTimer);
    const id = e.target.dataset.edit;
    const title = e.target.value;
    editTimer = setTimeout(() => {
      api('/tasks/' + id, { method: 'PUT', body: JSON.stringify({ title }) });
    }, 500);
  }
});

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea')) return;
  if (e.key === 'q' || e.key === 'a') { e.preventDefault(); openQuickAdd(); }
  else if (e.key === 'f') { e.preventDefault(); openFilterPanel(); }
  else if (e.key === '1') { currentView = 'today'; updateURL({ view: 'today' }); render(); }
  else if (e.key === '2') { currentView = 'upcoming'; updateURL({ view: 'upcoming' }); render(); }
  else if (e.key === '3') { currentView = 'all'; updateURL({ view: 'all' }); render(); }
});

document.addEventListener('mousedown', (e) => {
  if (openPopover && !openPopover.contains(e.target)
      && !e.target.closest('[data-menu], [data-preset-menu], [data-group-menu], .pill, #filterBtn')) {
    closePopover();
  }
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePopover(); });

window.addEventListener('popstate', () => {
  filters = getURLFilters();
  currentView = filters.view;
  render();
});

new ResizeObserver(entries => {
  document.body.classList.toggle('compact', entries[0].contentRect.width < 380);
}).observe(document.body);

setInterval(load, 30000);

async function initialLoad() {
  await load();
  const url = new URLSearchParams(location.search);
  const hasExplicit = ['view', 'group', 'priority', 'q', 'done', 'nodate', 'snoozed'].some(k => url.has(k));
  if (!hasExplicit) {
    const def = presets.find(p => p.is_default);
    if (def) {
      currentView = def.filters.view || 'today';
      filters = {
        view: currentView,
        group: def.filters.group || null,
        priority: def.filters.priority || null,
        search: def.filters.search || '',
        hideCompleted: def.filters.hideCompleted !== false,
        noDateOnly: false,
        snoozedOnly: false,
      };
      updateURL({
        view: currentView, group: filters.group, priority: filters.priority,
        q: filters.search || null, done: filters.hideCompleted ? null : '1',
      });
      render();
    }
  }
}
initialLoad();
</script>
